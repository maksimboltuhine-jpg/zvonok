<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЗВОНОК v7.1 | Stable Connect</title>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --bg: #111; }
body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

.container { width: 90%; max-width: 400px; background: #222; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

#video-grid { display: none; flex-direction: column; gap: 10px; margin: 15px 0; }
video { width: 100%; border-radius: 10px; background: #000; }
#local-video { width: 100px; position: absolute; top: 10px; right: 10px; border: 2px solid var(--green); transform: scaleX(-1); }
.video-wrap { position: relative; }

.id-box { background: #000; padding: 10px; border-radius: 10px; color: var(--green); font-family: monospace; cursor: pointer; margin-bottom: 15px; border: 1px dashed #444; }

input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }

.btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
.btn-call { background: var(--green); color: #000; }
.btn-hang { background: var(--red); color: #fff; display: none; }
.btn-screen { background: #ffaa00; color: #000; display: none; }

/* Окно входящего звонка */
#incoming-box { display: none; background: #333; padding: 15px; border-radius: 15px; margin-top: 10px; border: 2px solid var(--green); }

/* Окно демки */
#screen-view { display: none; position: fixed; inset: 0; background: #000; z-index: 100; }
#screen-video { width: 100%; height: 100%; object-fit: contain; }
.screen-close { position: absolute; top: 20px; right: 20px; padding: 10px 20px; background: var(--red); color: #fff; border-radius: 10px; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
<h2 style="color: var(--green)">Call v7.1</h2>

<div class="id-box" id="my-id" onclick="copyId()">Загрузка ID...</div>

<div id="video-grid" class="video-wrap">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
</div>

<div id="ui-start">
<input type="text" id="peer-id" placeholder="ID собеседника">
<button class="btn btn-call" onclick="makeCall()">📞 Позвонить</button>
</div>

<div id="incoming-box">
<p>Входящий звонок...</p>
<button class="btn btn-call" onclick="answerCall()">Ответить</button>
<button class="btn btn-hang" style="display:block" onclick="location.reload()">Сбросить</button>
</div>

<button class="btn btn-screen" id="btn-scr" onclick="toggleScreen()">🖥 Демонстрация экрана</button>
<button class="btn btn-hang" id="btn-hang" onclick="location.reload()">Завершить звонок</button>
</div>

<div id="screen-view">
<video id="screen-video" autoplay playsinline></video>
<div class="screen-close" onclick="closeScreen()">ЗАКРЫТЬ X</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer, localStream, currentCall, screenStream, screenCall;
const myId = localStorage.getItem('v71_id') || Math.random().toString(36).substr(2, 6);
localStorage.setItem('v71_id', myId);
document.getElementById('my-id').innerText = myId;

// Конфигурация с STUN серверами (важно для работы через разный интернет)
const peerConfig = {
host: location.hostname,
port: location.protocol === 'https:' ? 443 : (location.port || 80),
path: '/peerjs',
secure: location.protocol === 'https:',
config: {
'iceServers': [
{ urls: 'stun:stun.l.google.com:19302' },
{ urls: 'stun:stun1.l.google.com:19302' }
]
}
};

peer = new Peer(myId, peerConfig);

peer.on('open', id => console.log('Подключено к серверу, мой ID:', id));

// Обработка входящего вызова
peer.on('call', call => {
if (call.metadata?.type === 'screen') {
call.answer();
call.on('stream', stream => {
document.getElementById('screen-view').style.display = 'block';
document.getElementById('screen-video').srcObject = stream;
});
} else {
currentCall = call;
document.getElementById('incoming-box').style.display = 'block';
document.getElementById('ui-start').style.display = 'none';
}
});

async function makeCall() {
const targetId = document.getElementById('peer-id').value;
if (!targetId) return alert('Введите ID!');

try {
localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
showVideoUI();
const call = peer.call(targetId, localStream);
handleCall(call);
} catch (e) { alert('Ошибка камеры: ' + e.message); }
}

async function answerCall() {
try {
localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
document.getElementById('incoming-box').style.display = 'none';
showVideoUI();
currentCall.answer(localStream);
handleCall(currentCall);
} catch (e) { alert('Доступ запрещен!'); }
}

function handleCall(call) {
currentCall = call;
call.on('stream', remoteStream => {
document.getElementById('remote-video').srcObject = remoteStream;
});
call.on('close', () => location.reload());
}

function showVideoUI() {
document.getElementById('ui-start').style.display = 'none';
document.getElementById('video-grid').style.display = 'flex';
document.getElementById('btn-hang').style.display = 'block';
document.getElementById('local-video').srcObject = localStream;
if (!/Mobi|Android/i.test(navigator.userAgent)) {
document.getElementById('btn-scr').style.display = 'block';
}
}

async function toggleScreen() {
if (screenStream) {
screenStream.getTracks().forEach(t => t.stop());
screenStream = null;
return;
}
try {
screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
screenCall = peer.call(currentCall.peer, screenStream, { metadata: { type: 'screen' } });
} catch (e) { console.error(e); }
}

function closeScreen() {
document.getElementById('screen-view').style.display = 'none';
}

function copyId() {
navigator.clipboard.writeText(myId);
alert('ID скопирован');
}
</script>
</body>
</html>
