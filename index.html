<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CALL v30 LIGHT</title>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --bg: #050505; }
body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
.card { background: #111; padding: 25px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #222; }

#video-container { position: relative; width: 100%; margin: 15px 0; display: none; border-radius: 20px; overflow: hidden; background: #000; aspect-ratio: 4/3; border: 1px solid #333; }
video { width: 100%; height: 100%; object-fit: cover; background: #000; }
#local-video { position: absolute; top: 10px; right: 10px; width: 80px; height: 110px; border: 2px solid var(--green); border-radius: 12px; transform: scaleX(-1); object-fit: cover; z-index: 10; }

.controls { display: none; justify-content: center; gap: 15px; margin-bottom: 10px; }
.btn-circle { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; font-size: 22px; background: #222; color: #fff; display: flex; align-items: center; justify-content: center; }
.off { background: var(--red) !important; }

.my-id { background: #1a1a1a; padding: 15px; border-radius: 15px; margin: 10px 0; color: var(--green); border: 1px solid #333; cursor: pointer; font-family: monospace; font-size: 16px; }
input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 15px; text-align: center; box-sizing: border-box; font-size: 16px; }
.btn-main { width: 100%; background: var(--green); color: #000; padding: 18px; font-size: 18px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; }

#incoming { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
#status { font-size: 12px; color: #666; margin-top: 15px; font-family: monospace; }
</style>
</head>
<body>

<div class="card">
<h3 style="margin:0; color:var(--green)">v30 LIGHT CALL</h3>

<div id="video-container">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
</div>

<div class="controls" id="controls">
<button class="btn-circle" id="mic-btn" onclick="toggleMic()">🎤</button>
<button class="btn-circle" id="cam-btn" onclick="toggleCam()">📷</button>
<button class="btn-circle" style="background:var(--red)" onclick="location.reload()">📞</button>
</div>

<div class="my-id" id="my-id" onclick="copyId()">ID: ЗАГРУЗКА...</div>

<div id="ui">
<input type="text" id="target-id" placeholder="ВВЕДИТЕ ID ДРУГА">
<button class="btn-main" onclick="startCall()">📞 ПОЗВОНИТЬ</button>
</div>

<div id="status">Система готова</div>
</div>

<div id="incoming">
<h2 style="color:var(--green)">ВХОДЯЩИЙ ВЫЗОВ</h2>
<button class="btn-main" id="answer-btn" style="width:250px; margin-bottom: 20px;">ОТВЕТИТЬ</button>
<button class="btn-main" style="background:var(--red); color:#fff; width:250px" onclick="location.reload()">ОТКЛОНИТЬ</button>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
const statusMsg = (m) => { document.getElementById('status').innerText = m; console.log(m); };
let myId = localStorage.getItem('v30_id') || ('u' + Math.floor(Math.random()*9000+1000));
localStorage.setItem('v30_id', myId);

let peer, localStream, currentCall;

function init() {
// Используем проверенный конфиг с STUN серверами Google
peer = new Peer(myId, {
host: window.location.hostname,
path: '/peerjs',
port: window.location.port || (window.location.protocol === 'https:' ? 443 : 80),
secure: window.location.protocol === 'https:',
config: {
'iceServers': [
{ urls: 'stun:stun.l.google.com:19302' },
{ urls: 'stun:stun1.l.google.com:19302' },
{ urls: 'stun:stun2.l.google.com:19302' }
]
}
});

peer.on('open', id => {
document.getElementById('my-id').innerText = "ID: " + id;
statusMsg("В сети");
});

peer.on('call', call => {
document.getElementById('incoming').style.display = 'flex';
document.getElementById('answer-btn').onclick = async () => {
try {
localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
call.answer(localStream);
document.getElementById('incoming').style.display = 'none';
setupCall(call);
} catch (e) { alert("Разрешите доступ к камере!"); }
};
});

peer.on('error', e => {
statusMsg("Ошибка: " + e.type);
if(e.type === 'peer-unavailable') alert("Друг не в сети!");
});
}

async function startCall() {
const id = document.getElementById('target-id').value.trim();
if (!id) return;
try {
statusMsg("Запуск камеры...");
localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
statusMsg("Звоним...");
setupCall(peer.call(id, localStream));
} catch (e) { statusMsg("Нет доступа к камере"); }
}

function setupCall(call) {
currentCall = call;
document.getElementById('video-container').style.display = 'block';
document.getElementById('ui').style.display = 'none';
document.getElementById('controls').style.display = 'flex';
document.getElementById('local-video').srcObject = localStream;

call.on('stream', remoteStream => {
statusMsg("Связь установлена");
const rv = document.getElementById('remote-video');
if (rv.srcObject !== remoteStream) {
rv.srcObject = remoteStream;
rv.play().catch(() => {
document.body.onclick = () => rv.play();
});
}
});

call.on('close', () => location.reload());
}

function toggleMic() {
localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
document.getElementById('mic-btn').classList.toggle('off', !localStream.getAudioTracks()[0].enabled);
}

function toggleCam() {
localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled;
document.getElementById('cam-btn').classList.toggle('off', !localStream.getVideoTracks()[0].enabled);
}

function copyId() {
const id = document.getElementById('my-id').innerText.replace("ID: ", "");
navigator.clipboard.writeText(id).then(() => alert("ID скопирован!"));
}

init();
</script>
</body>
</html>
