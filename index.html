<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЗВОНОК v6.9 | Ultimate</title>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --orange: #ffaa00; --bg: #0b0b0b; }
body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

.card { background: #1a1a1a; padding: 25px; border-radius: 32px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: 0.5s; }

/* Видео звонка */
#video-container { position: relative; width: 100%; margin: 15px 0; display: none; border-radius: 20px; overflow: hidden; background: #000; border: 1px solid #444; aspect-ratio: 4/3; }
video { width: 100%; height: 100%; object-fit: cover; background: #000; }
#local-video { position: absolute; top: 10px; right: 10px; width: 80px; height: 110px; border: 2px solid var(--green); border-radius: 12px; z-index: 15; transform: scaleX(-1); }

/* Окно демки */
#screen-wrap {
position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
background: #000; z-index: 100; display: none; flex-direction: column;
}
#remote-screen { width: 100%; height: 100%; object-fit: contain; }
.screen-tools { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 110; }

.info { background: #000; padding: 15px; border-radius: 16px; margin-bottom: 20px; color: var(--green); font-weight: bold; cursor: pointer; border: 1px dashed #444; font-family: monospace; }

.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
input { grid-column: span 2; padding: 16px; border-radius: 16px; border: 1px solid #333; background: #080808; color: #fff; text-align: center; font-size: 16px; outline: none; }

.btn { padding: 16px; border-radius: 16px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
.btn-call { background: var(--green); color: #000; grid-column: span 2; }
.btn-opt { background: #252525; color: #fff; }
.btn-opt.active { background: var(--green); color: #000; }
.btn-screen { background: var(--orange); color: #000; grid-column: span 2; display: none; margin-top: 5px; }
.btn-red { background: var(--red); color: #fff; }

#inc-call { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="card" id="main-ui">
<h3 style="margin: 0 0 15px 0; color:var(--green);">ЗВОНОК v6.9</h3>

<div id="video-container">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
</div>

<div class="info" id="my-id" onclick="copyId()">ЗАГРУЗКА...</div>

<div id="start-form" class="controls">
<input type="text" id="target-id" placeholder="ID ДРУГА">
<button class="btn btn-call" onclick="startCall()">📞 ПОЗВОНИТЬ</button>
</div>

<div id="active-menu" class="controls" style="display:none">
<button class="btn btn-opt active" id="m-tgl" onclick="tglMic()">🎤</button>
<button class="btn btn-opt active" id="v-tgl" onclick="tglVid()">📷</button>
<button class="btn btn-screen" id="scr-btn" onclick="shareScr()">🖥 ДЕМОНСТРАЦИЯ ЭКРАНА</button>
<button class="btn btn-red" style="grid-column: span 2; margin-top:10px" onclick="location.reload()">ЗАВЕРШИТЬ</button>
</div>
</div>

<div id="screen-wrap">
<video id="remote-screen" autoplay playsinline></video>
<div class="screen-tools">
<button class="btn btn-opt" onclick="toggleFullScreen()">РАЗВЕРНУТЬ</button>
<button class="btn btn-red" onclick="closeScreenView()">ЗАКРЫТЬ ПРОСМОТР</button>
</div>
</div>

<div id="inc-call">
<h2 style="color:var(--green)">ВХОДЯЩИЙ ЗВОНОК...</h2>
<button class="btn btn-call" id="ans-btn" style="width:200px">ОТВЕТИТЬ</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer, localStream, screenStream, currentCall, screenCall;
const myId = localStorage.getItem('v6_id') || 'id' + Math.floor(Math.random()*9000+1000);
localStorage.setItem('v6_id', myId);
document.getElementById('my-id').innerText = myId;

function init() {
peer = new Peer(myId, {
host: location.hostname,
port: location.protocol === 'https:' ? 443 : (location.port || 80),
path: '/peerjs',
secure: location.protocol === 'https:',
config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
});

peer.on('call', call => {
// ПРОВЕРКА: Это экран или камера?
if (call.metadata && call.metadata.type === 'screen') {
call.answer();
call.on('stream', stream => {
document.getElementById('screen-wrap').style.display = 'flex';
const sv = document.getElementById('remote-screen');
sv.srcObject = stream;
sv.play();
});
} else {
document.getElementById('inc-call').style.display = 'flex';
document.getElementById('ans-btn').onclick = async () => {
localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
call.answer(localStream);
document.getElementById('inc-call').style.display = 'none';
setupUI(call);
};
}
});
}

async function startCall() {
const tid = document.getElementById('target-id').value;
if(!tid) return alert("Введите ID");
localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
const call = peer.call(tid, localStream);
setupUI(call);
}

function setupUI(call) {
currentCall = call;
document.getElementById('start-form').style.display = 'none';
document.getElementById('active-menu').style.display = 'grid';
document.getElementById('video-container').style.display = 'block';
document.getElementById('local-video').srcObject = localStream;

// Показываем кнопку демки только на ПК
if(!/Mobi|Android/i.test(navigator.userAgent)) {
document.getElementById('scr-btn').style.display = 'block';
}

call.on('stream', stream => {
const rv = document.getElementById('remote-video');
rv.srcObject = stream;
rv.play();
});
}

async function shareScr() {
if (screenStream) {
screenStream.getTracks().forEach(t => t.stop());
screenStream = null;
document.getElementById('scr-btn').innerText = "🖥 ДЕМОНСТРАЦИЯ ЭКРАНА";
return;
}
try {
screenStream = await navigator.mediaDevices.getDisplayMedia({video: true});
// Важно: передаем метаданные, чтобы другой понял, что это экран
screenCall = peer.call(currentCall.peer, screenStream, {metadata: {type: 'screen'}});
document.getElementById('scr-btn').innerText = "🛑 ОСТАНОВИТЬ ДЕМКУ";

screenStream.getVideoTracks()[0].onended = () => {
document.getElementById('scr-btn').innerText = "🖥 ДЕМОНСТРАЦИЯ ЭКРАНА";
screenStream = null;
};
} catch (e) { console.error(e); }
}

function toggleFullScreen() {
const el= document.getElementById('remote-screen');
if (el.requestFullscreen) el.requestFullscreen();
else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

function closeScreenView() {
document.getElementById('screen-wrap').style.display = 'none';
document.getElementById('remote-screen').srcObject = null;
}

function tglMic() {
const t = localStream.getAudioTracks()[0];
t.enabled = !t.enabled;
document.getElementById('m-tgl').classList.toggle('active', t.enabled);
}

function tglVid() {
const t = localStream.getVideoTracks()[0];
t.enabled = !t.enabled;
document.getElementById('v-tgl').classList.toggle('active', t.enabled);
}

function copyId() {
navigator.clipboard.writeText(myId);
alert("ID Скопирован!");
}

init();
</script>
</body>
</html>
