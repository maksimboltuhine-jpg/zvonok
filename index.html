<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЗВОНОК v6.5.1 | Чистый код</title>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --bg: #0b0b0b; }
body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card { background: #1a1a1a; padding: 20px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #333; }
#video-container { position: relative; width: 100%; margin: 15px 0; display: none; border-radius: 15px; overflow: hidden; background: #000; border: 1px solid #444; aspect-ratio: 4/3; }
video { width: 100%; height: 100%; object-fit: cover; }
#local-video { position: absolute; top: 10px; right: 10px; width: 80px; height: 110px; border: 2px solid var(--green); border-radius: 10px; transform: scaleX(-1); }
.info { background: #000; padding: 12px; border-radius: 12px; margin-bottom: 15px; color: var(--green); font-family: monospace; border: 1px dashed #444; cursor: pointer; }
.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
input { grid-column: span 2; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
.btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
.btn-call { background: var(--green); color: #000; grid-column: span 2; }
.btn-red { background: var(--red); color: #fff; grid-column: span 2; margin-top: 10px; }
#inc-call { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="card">
<h3 style="color:var(--green)">CALL v6.5.1</h3>
<div id="video-container">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
</div>
<div class="info" id="my-id" onclick="copyId()">ПОДКЛЮЧЕНИЕ...</div>
<div id="ui" class="controls">
<input type="text" id="target-id" placeholder="ID ДРУГА">
<button class="btn btn-call" onclick="startCall()">ПОЗВОНИТЬ</button>
</div>
<button class="btn btn-red" id="hangup" style="display:none" onclick="location.reload()">ЗАВЕРШИТЬ</button>
</div>

<div id="inc-call">
<h2 style="color:var(--green)">ВХОДЯЩИЙ ВЫЗОВ</h2>
<button class="btn btn-call" id="ans-btn" style="width:200px; margin-bottom:10px">ОТВЕТИТЬ</button>
<button class="btn btn-red" style="width:200px" onclick="location.reload()">ОТКЛОНИТЬ</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer, localStream, currentCall;
const myId = localStorage.getItem('v6_id') || 'u' + Math.floor(Math.random()*9000+1000);
localStorage.setItem('v6_id', myId);

peer = new Peer(myId, {
host: location.hostname,
port: location.protocol === 'https:' ? 443 : (location.port || 80),
path: '/peerjs',
secure: location.protocol === 'https:',
config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
});

peer.on('open', id => document.getElementById('my-id').innerText = id);

peer.on('call', call => {
document.getElementById('inc-call').style.display = 'flex';
document.getElementById('ans-btn').onclick = async () => {
localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
call.answer(localStream);
document.getElementById('inc-call').style.display = 'none';
setupUI(call);
};
});

async function startCall() {
consttid = document.getElementById('target-id').value;
if(!tid) return alert("Введите ID");
localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
const call = peer.call(tid, localStream);
setupUI(call);
}

function setupUI(call) {
document.getElementById('ui').style.display = 'none';
document.getElementById('video-container').style.display = 'block';
document.getElementById('hangup').style.display = 'block';
document.getElementById('local-video').srcObject = localStream;
call.on('stream', s => document.getElementById('remote-video').srcObject = s);
}

function copyId() {
navigator.clipboard.writeText(myId);
alert("Скопировано!");
}
</script>
</body>
</html>
