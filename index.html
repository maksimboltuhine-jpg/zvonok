<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЗВОНОК v6.8 | Stable Release</title>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --orange: #ffaa00; --bg: #0b0b0b; }
body { background: var(--bg); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

.card { background: #1a1a1a; padding: 25px; border-radius: 32px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 10; }

#video-container { position: relative; width: 100%; margin: 15px 0; display: none; border-radius: 20px; overflow: hidden; background: #000; border: 1px solid #444; aspect-ratio: 4/3; }
video { width: 100%; height: 100%; object-fit: cover; background: #000; }

#local-video { position: absolute; top: 10px; right: 10px; width: 90px; height: 120px; border: 2px solid var(--green); border-radius: 12px; z-index: 15; transform: scaleX(-1); }

#screen-container { width: 100%; margin-top: 10px; border-radius: 15px; overflow: hidden; display: none; border: 2px solid var(--orange); position: relative; cursor: pointer; }
.fullscreen-hint { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.7); color: var(--orange); padding: 6px 10px; font-size: 11px; border-radius: 8px; z-index: 20; pointer-events: none; font-weight: bold; }

.info { background: #000; padding: 15px; border-radius: 16px; margin-bottom: 20px; color: var(--green); font-weight: bold; cursor: pointer; border: 1px dashed #444; font-family: monospace; font-size: 16px; transition: 0.2s; }
.info:active { transform: scale(0.96); opacity: 0.8; }

.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
input { grid-column: span 2; padding: 16px; border-radius: 16px; border: 1px solid #333; background: #080808; color: #fff; text-align: center; font-size: 16px; outline: none; transition: 0.3s; }
input:focus { border-color: var(--green); box-shadow: 0 0 10px rgba(0,255,136,0.2); }

.btn { padding: 16px; border-radius: 16px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; }
.btn-main { background: var(--green); color: #000; grid-column: span 2; }
.btn-main:hover { filter: brightness(1.1); }
.btn-opt { background: #252525; color: #fff; }
.btn-opt.active { background: var(--green); color: #000; }
.btn-screen { background: var(--orange); color: #000; grid-column: span 2; display: none; }
.btn-red { background: var(--red); color: #fff; grid-column: span 2; display: none; margin-top: 10px; }

#incoming-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

.status-badge { font-size: 10px; padding: 4px 8px; border-radius: 20px; background: #333; margin-bottom: 10px; display: inline-block; }
</style>
</head>
<body>

<div class="card">
<div class="status-badge" id="net-status">УСТАНОВКА СОЕДИНЕНИЯ...</div>
<h3 style="margin: 0 0 15px 0; color:var(--green); letter-spacing: 1px;">ЗВОНОК v6.8</h3>

<div id="video-container">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
</div>

<div id="screen-container" onclick="toggleFullscreen(this)">
<div class="fullscreen-hint">Нажмите для полноэкранного режима</div>
<video id="remote-screen" autoplay playsinline style="object-fit: contain;"></video>
</div>

<div class="info" id="my-id-display" onclick="copyMyId()">ИНИЦИАЛИЗАЦИЯ ИДЕНТИФИКАТОРА...</div>

<div id="setup-ui" class="controls">
<input type="text" id="peer-id-input" placeholder="ВВЕДИТЕ ID СОБЕСЕДНИКА">
<button class="btn btn-main" onclick="makeCall()">📞 ИНИЦИИРОВАТЬ ВЫЗОВ</button>
</div>

<div id="call-ui" class="controls" style="display:none">
<button class="btn btn-opt active" id="mic-toggle" onclick="toggleMic()">🎤 МИКРОФОН</button>
<button class="btn btn-opt active" id="cam-toggle" onclick="toggleCam()">📷 КАМЕРА</button>
<button class="btn btn-screen" id="screen-btn" onclick="shareScreen()">🖥 ТРАНСЛЯЦИЯ ЭКРАНА</button>
<button class="btn btn-red" id="hangup-btn" onclick="endCall()">ЗАВЕРШИТЬ СЕАНС</button>
</div>
</div>

<div id="incoming-overlay">
<h2 style="color:#fff; margin-bottom: 30px;">ВХОДЯЩЕЕ СОЕДИНЕНИЕ</h2>
<button class="btn btn-main" id="accept-btn" style="width:240px; margin-bottom:15px">ПРИНЯТЬ</button>
<button class="btn btn-red" style="display:block; width:240px" onclick="location.reload()">ОТКЛОНИТЬ</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer, localStream, screenStream, currentCall, screenCall;

// Генерация и хранение постоянного идентификатора
const myId = localStorage.getItem('v6_stable_id') || 'u' + Math.random().toString(36).substr(2, 7);
localStorage.setItem('v6_stable_id', myId);

function initPeer() {
peer = new Peer(myId, {
host: location.hostname,
port: location.protocol === 'https:' ? 443 : (location.port || 80),
path: '/peerjs',
secure: location.protocol === 'https:',
config: {
'iceServers': [
{ urls: 'stun:stun.l.google.com:19302' },
{ urls: 'stun:stun1.l.google.com:19302' },
{ urls: 'stun:stun2.l.google.com:19302' }
]
},
debug: 2
});

peer.on('open', id => {
document.getElementById('my-id-display').innerText = id;
document.getElementById('net-status').innerText = 'СЕТЬ ДОСТУПНА';
document.getElementById('net-status').style.color = 'var(--green)';
});

peer.on('call', async (call) => {
if (call.metadata && call.metadata.type === 'screen') {
call.answer();
call.on('stream', remoteStream => {
const screenVideoElement = document.getElementById('remote-screen');
screenVideoElement.srcObject = remoteStream;
document.getElementById('screen-container').style.display = 'block';
});
} else {
document.getElementById('incoming-overlay').style.display = 'flex';
document.getElementById('accept-btn').onclick = async () => {
try {
localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
call.answer(localStream);
document.getElementById('incoming-overlay').style.display = 'none';
setupCallInterface(call);
} catch (error) {
alert("Сбой аппаратного обеспечения: доступ к камере или микрофону запрещен.");
}
};
}
});

peer.on('error', err => {
if(err.type === 'peer-unavailable') alert('Целевой узел не обнаружен в сети.');
console.error('Системная ошибка PeerJS:', err);
});
}

async function makeCall() {
const remoteId = document.getElementById('peer-id-input').value.trim();
if (!remoteId) return alert("Необходимо указать идентификатор целевого узла.");
if (remoteId === myId) return alert("Замыкание соединения на собственный узел недопустимо.");

try {
localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
const call = peer.call(remoteId, localStream);
setupCallInterface(call);
} catch (error) {
alert("Сбой аппаратного обеспечения. Проверьте настройки разрешений браузера.");
}
}

function setupCallInterface(call) {
currentCall = call;
document.getElementById('setup-ui').style.display = 'none';
document.getElementById('call-ui').style.display = 'grid';
document.getElementById('video-container').style.display = 'block';
document.getElementById('hangup-btn').style.display = 'block';

if (!/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
document.getElementById('screen-btn').style.display = 'block';
}

const localVideoElement = document.getElementById('local-video');
localVideoElement.srcObject = localStream;

call.on('stream', remoteStream => {
const remoteVideoElement = document.getElementById('remote-video');
if (remoteVideoElement.srcObject !== remoteStream) {
remoteVideoElement.srcObject = remoteStream;
}
});

call.on('close', endCall);
}

async function shareScreen() {
if (screenStream) { stopScreen(); return; }
try {
screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
screenCall = peer.call(currentCall.peer, screenStream, { metadata: { type: 'screen' } });
document.getElementById('screen-btn').innerText = "ЗАВЕРШИТЬ ТРАНСЛЯЦИЮ";

screenStream.getVideoTracks()[0].onended = stopScreen;
} catch (error) {
console.error("Процесс захвата экрана прерван:", error);
}
}

function stopScreen() {
if (screenStream) screenStream.getTracks().forEach(track => track.stop());
if (screenCall) screenCall.close();
screenStream = null;
document.getElementById('screen-btn').innerText = "🖥 ТРАНСЛЯЦИЯ ЭКРАНА";
document.getElementById('screen-container').style.display = 'none';
}

function toggleMic() {
if (!localStream) return;
const audioTracks = localStream.getAudioTracks();
if (audioTracks.length > 0) {
audioTracks[0].enabled = !audioTracks[0].enabled;
document.getElementById('mic-toggle').classList.toggle('active', audioTracks[0].enabled);
}
}

function toggleCam() {
if (!localStream) return;
const videoTracks = localStream.getVideoTracks();
if (videoTracks.length > 0) {
videoTracks[0].enabled = !videoTracks[0].enabled;
document.getElementById('cam-toggle').classList.toggle('active', videoTracks[0].enabled);
}
}

function toggleFullscreen(element) {
if (!document.fullscreenElement) {
if (element.requestFullscreen) {
element.requestFullscreen();
} else if (element.webkitRequestFullscreen) {
element.webkitRequestFullscreen();
} else if (element.msRequestFullscreen) {
element.msRequestFullscreen();
}
} else {
if (document.exitFullscreen) {
document.exitFullscreen();
} else if (document.webkitExitFullscreen) {
document.webkitExitFullscreen();
}
}
}

function endCall() {
location.reload();
}

function copyMyId() {
navigator.clipboard.writeText(myId);
const displayElement = document.getElementById('my-id-display');
const originalText = displayElement.innerText;
displayElement.innerText = "ДАННЫЕ СКОПИРОВАНЫ";
setTimeout(() => displayElement.innerText = originalText, 1500);
}

initPeer();
</script>
</body>
</html>
