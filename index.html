<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CALL v36 REBORN</title>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --bg: #050505; }
body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: #111; padding: 25px; border-radius: 25px; width: 90%; max-width: 360px; text-align: center; border: 1px solid #222; }

#video-view { position: relative; width: 100%; margin: 15px 0; display: none; border-radius: 15px; overflow: hidden; background: #000; aspect-ratio: 4/3; }
video { width: 100%; height: 100%; object-fit: cover; }
#local-video { position: absolute; top: 10px; right: 10px; width: 70px; height: 90px; border: 1px solid var(--green); border-radius: 10px; z-index: 5; transform: scaleX(-1); }

.controls { display: none; justify-content: center; gap: 15px; margin-top: 10px; }
.btn-round { width: 50px; height: 50px; border-radius: 50%; border: none; background: #222; color: #fff; font-size: 20px; cursor: pointer; }

.id-display { background: #1a1a1a; padding: 15px; border-radius: 12px; margin: 10px 0; color: var(--green); font-family: monospace; font-weight: bold; border: 1px solid #333; cursor: pointer; }
input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 10px; text-align: center; box-sizing: border-box; }
.btn-call { width: 100%; background: var(--green); color: #000; padding: 15px; font-size: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }

#status { font-size: 10px; color: #444; margin-top: 10px; }
#inc-box { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="card">
<div id="video-view">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
</div>

<div class="controls" id="controls">
<button class="btn-round" id="m-btn" onclick="tMic()">🎤</button>
<button class="btn-round" id="v-btn" onclick="tVid()">📷</button>
<button class="btn-round" style="background:var(--red)" onclick="location.reload()">🔚</button>
</div>

<div class="id-display" id="my-id" onclick="copyId()">ЗАГРУЗКА...</div>

<div id="ui-main">
<input type="text" id="peer-target" placeholder="ID ДРУГА">
<button class="btn-call" onclick="makeCall()">📞 ПОЗВОНИТЬ</button>
</div>

<div id="status">INITIALIZING...</div>
</div>

<div id="inc-box">
<h2 style="color:var(--green)">ВХОДЯЩИЙ ВЫЗОВ</h2>
<button class="btn-call" id="ans-btn" style="width:200px; margin-bottom: 20px;">ОТВЕТИТЬ</button>
<button class="btn-call" style="background:var(--red); color:#fff; width:200px" onclick="location.reload()">ОТКЛОНИТЬ</button>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
const stat = (t) => document.getElementById('status').innerText = t;

// Постоянный ID
let myId = localStorage.getItem('p_id');
if (!myId) {
myId = 'id-' + Math.floor(Math.random() * 9000 + 1000);
localStorage.setItem('p_id', myId);
}

const peer = new Peer(myId, {
host: 'zvonok-3w3f.onrender.com',
port: 443,
secure: true,
path: '/peerjs'
});

let stream;

peer.on('open', id => {
document.getElementById('my-id').innerText = "ID: " + id;
stat("READY");
});

// Обработка входящего
peer.on('call', call => {
document.getElementById('inc-box').style.display = 'flex';
document.getElementById('ans-btn').onclick = async () => {
try {
stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
call.answer(stream);
document.getElementById('inc-box').style.display = 'none';
handleCall(call);
} catch(e) { alert("Ошибка камеры"); }
};
});

async function makeCall() {
const tid = document.getElementById('peer-target').value.trim();
if(!tid) return;
try {
stat("STARTING CAMERA...");
stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
const call = peer.call(tid, stream);
handleCall(call);
} catch(e) { stat("CAMERA ERROR"); }
}

function handleCall(call) {
document.getElementById('video-view').style.display = 'block';
document.getElementById('ui-main').style.display = 'none';
document.getElementById('controls').style.display = 'flex';
document.getElementById('local-video').srcObject = stream;

call.on('stream', rs => {
stat("CONNECTED");
document.getElementById('remote-video').srcObject = rs;
});

call.on('error', () => location.reload());
call.on('close', () => location.reload());
}

function tMic() {
stream.getAudioTracks()[0].enabled = !stream.getAudioTracks()[0].enabled;
document.getElementById('m-btn').style.background = stream.getAudioTracks()[0].enabled ? "#222" : "var(--red)";
}

function tVid() {
stream.getVideoTracks()[0].enabled = !stream.getVideoTracks()[0].enabled;
document.getElementById('v-btn').style.background = stream.getVideoTracks()[0].enabled ? "#222" : "var(--red)";
}

function copyId() {
const id = document.getElementById('my-id').innerText.replace("ID: ", "");
navigator.clipboard.writeText(id).then(() => alert("ID скопирован"));
}

peer.on('error', e => {
stat("PEER ERROR: " + e.type);
if(e.type === 'peer-unavailable') alert("Абонент недоступен");
});
</script>
</body>
</html>
