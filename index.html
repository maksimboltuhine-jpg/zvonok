<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЗВОНОК v6.6 | Stable</title>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --orange: #ffaa00; --bg: #0b0b0b; }
body { background: var(--bg); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

.card { background: #1a1a1a; padding: 25px; border-radius: 32px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 10; }

#video-container { position: relative; width: 100%; margin: 15px 0; display: none; border-radius: 20px; overflow: hidden; background: #000; border: 1px solid #444; aspect-ratio: 4/3; }
video { width: 100%; height: 100%; object-fit: cover; background: #000; }
#local-video { position: absolute; top: 10px; right: 10px; width: 90px; height: 120px; border: 2px solid var(--green); border-radius: 12px; z-index: 15; transform: scaleX(-1); }

#screen-container { width: 100%; margin-top: 10px; border-radius: 15px; overflow: hidden; display: none; border: 2px solid var(--orange); }

.info { background: #000; padding: 15px; border-radius: 16px; margin-bottom: 20px; color: var(--green); font-weight: bold; cursor: pointer; border: 1px dashed #444; font-family: monospace; font-size: 16px; transition: 0.2s; }
.info:active { transform: scale(0.96); opacity: 0.8; }

.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
input { grid-column: span 2; padding: 16px; border-radius: 16px; border: 1px solid #333; background: #080808; color: #fff; text-align: center; font-size: 16px; outline: none; transition: 0.3s; }
input:focus { border-color: var(--green); box-shadow: 0 0 10px rgba(0,255,136,0.2); }

.btn { padding: 16px; border-radius: 16px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; }
.btn-main { background: var(--green); color: #000; grid-column: span 2; }
.btn-main:hover { filter: brightness(1.1); }
.btn-opt { background: #252525; color: #fff; }
.btn-opt.active { background: var(--green); color: #000; }
.btn-screen { background: var(--orange); color: #000; grid-column: span 2; display: none; }
.btn-red { background: var(--red); color: #fff; grid-column: span 2; display: none; margin-top: 10px; }

#incoming-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

.status-badge { font-size: 10px; padding: 4px 8px; border-radius: 20px; background: #333; margin-bottom: 10px; display: inline-block; }
</style>
</head>
<body>

<div class="card">
<div class="status-badge" id="net-status">OFFLINE</div>
<h3 style="margin: 0 0 15px 0; color:var(--green); letter-spacing: 1px;">ЗВОНОК v6.6</h3>

<div id="video-container">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
</div>

<div id="screen-container">
<video id="remote-screen" autoplay playsinline></video>
</div>

<div class="info" id="my-id-display" onclick="copyMyId()">ЗАГРУЗКА ID...</div>

<div id="setup-ui" class="controls">
<input type="text" id="peer-id-input" placeholder="ID СОБЕСЕДНИКА">
<button class="btn btn-main" onclick="makeCall()">📞 ПОЗВОНИТЬ</button>
</div>

<div id="call-ui" class="controls" style="display:none">
<button class="btn btn-opt active" id="mic-toggle" onclick="toggleMic()">🎤 МИК</button>
<button class="btn btn-opt active" id="cam-toggle" onclick="toggleCam()">📷 КАМ</button>
<button class="btn btn-screen" id="screen-btn" onclick="shareScreen()">🖥 ДЕМКА</button>
<button class="btn btn-red" id="hangup-btn" onclick="endCall()">ЗАВЕРШИТЬ</button>
</div>
</div>

<div id="incoming-overlay">
<div style="background: var(--green); width: 80px; height: 80px; border-radius: 50%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; animation: pulse 1.5s infinite;">
<span style="font-size: 40px;">📞</span>
</div>
<h2 style="color:#fff; margin-bottom: 30px;">ВХОДЯЩИЙ ВЫЗОВ</h2>
<button class="btn btn-main" id="accept-btn" style="width:240px; margin-bottom:15px">ОТВЕТИТЬ</button>
<button class="btn btn-red" style="display:block; width:240px" onclick="location.reload()">ОТКЛОНИТЬ</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer, localStream, screenStream, currentCall, screenCall;

// ПЕРМАНЕНТНЫЙ ID
const myId = localStorage.getItem('v6_stable_id') || 'u' + Math.random().toString(36).substr(2, 7);
localStorage.setItem('v6_stable_id', myId);

function initPeer() {
peer = new Peer(myId, {
host: location.hostname,
port: location.protocol === 'https:' ? 443 : (location.port || 80),
path: '/peerjs',
secure: location.protocol === 'https:',
debug: 1
});

peer.on('open', id => {
document.getElementById('my-id-display').innerText = id;
document.getElementById('net-status').innerText = 'ONLINE';
document.getElementById('net-status').style.color = 'var(--green)';
});

peer.on('call', async (call) => {
if (call.metadata && call.metadata.type === 'screen') {
call.answer();
call.on('stream', s => {
const sv = document.getElementById('remote-screen');
sv.srcObject = s;
document.getElementById('screen-container').style.display = 'block';
});
} else {
document.getElementById('incoming-overlay').style.display = 'flex';
document.getElementById('accept-btn').onclick = async () => {
try {
localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
call.answer(localStream);
document.getElementById('incoming-overlay').style.display = 'none';
handleCall(call);
} catch (e) { alert("Нет доступа к камере"); }
};
}
});

peer.on('error', err => {
if(err.type === 'peer-unavailable') alert('Пользователь не найден или оффлайн');
console.error(err);
});
}

async function makeCall() {
const remoteId = document.getElementById('peer-id-input').value;
if (!remoteId) return alert("Введите ID!");
if (remoteId === myId) return alert("Нельзя звонить самому себе");

try {
localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
const call = peer.call(remoteId, localStream);
handleCall(call);
} catch (e) { alert("Ошибка доступа к медиа"); }
}

function handleCall(call) {
currentCall = call;
document.getElementById('setup-ui').style.display = 'none';
document.getElementById('call-ui').style.display = 'grid';
document.getElementById('video-container').style.display = 'block';
document.getElementById('hangup-btn').style.display = 'block';

if (!/Android|iPhone|iPad/i.test(navigator.userAgent)) {
document.getElementById('screen-btn').style.display = 'block';
}

document.getElementById('local-video').srcObject = localStream;

call.on('stream', rs => {
const rv = document.getElementById('remote-video');
rv.srcObject = rs;
rv.play();
});

call.on('close', endCall);
}

async function shareScreen() {
if (screenStream) { stopScreen(); return; }
try {
screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
screenCall = peer.call(currentCall.peer, screenStream, { metadata: { type: 'screen' } });
document.getElementById('screen-btn').innerText = "СТОП ЭКРАН";
screenStream.getVideoTracks()[0].onended = stopScreen;
} catch (e) { console.error(e); }
}

function stopScreen() {
if (screenStream) screenStream.getTracks().forEach(t => t.stop());
if (screenCall) screenCall.close();
screenStream = null;
document.getElementById('screen-btn').innerText = "🖥 ДЕМКА";
}

function toggleMic() {
const t = localStream.getAudioTracks()[0];
t.enabled = !t.enabled;
document.getElementById('mic-toggle').classList.toggle('active', t.enabled);
}

function toggleCam() {
const t = localStream.getVideoTracks()[0];
t.enabled = !t.enabled;
document.getElementById('cam-toggle').classList.toggle('active', t.enabled);
}

function endCall() {
location.reload();
}

function copyMyId() {
navigator.clipboard.writeText(myId);
const el = document.getElementById('my-id-display');
const old = el.innerText;
el.innerText = "СКОПИРОВАНО!";
setTimeout(() => el.innerText = old, 1000);
}

initPeer();
</script>

<style>
@keyframes pulse {
0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(0, 255, 136, 0); }
100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
}
</style>
</body>
</html>
