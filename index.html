<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEBUG CALL v7.3</title>
<style>
body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 10px; }
.box { border: 1px solid #444; padding: 15px; border-radius: 10px; max-width: 400px; margin: auto; }
video { width: 100%; background: #222; border-radius: 10px; margin-top: 10px; height: 200px; object-fit: cover; }
#local-video { width: 100px; height: 130px; border: 2px solid #0f8; position: absolute; bottom: 10px; right: 10px; }
.btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
.btn-call { background: #0f8; color: #000; }
.btn-red { background: #f44; color: #fff; }
#log { background: #111; color: #0f0; font-size: 11px; text-align: left; padding: 10px; height: 120px; overflow-y: scroll; border: 1px solid #333; margin-top: 10px; font-family: monospace; }
input { width: 100%; padding: 12px; margin-bottom: 5px; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #555; border-radius: 8px; }
.video-wrap { position: relative; width: 100%; }
.status-tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>

<div class="box">
<h3>Call v7.3 <span id="protocol-check" class="status-tag">...</span></h3>
<div style="margin-bottom: 10px;">Твой ID: <span id="my-id" style="color:#0f8; font-weight:bold;">Ожидание...</span></div>

<div id="setup-area">
<input type="text" id="target-id" placeholder="ID друга">
<button class="btn btn-call" onclick="startCall()">📞 ПОЗВОНИТЬ</button>
</div>

<div id="incoming-area" style="display:none; border: 1px solid #0f8; padding: 10px; margin: 10px 0;">
<p>Входящий звонок!</p>
<button class="btn btn-call" onclick="acceptCall()">ОТВЕТИТЬ</button>
<button class="btn btn-red" onclick="location.reload()">СБРОС</button>
</div>

<div id="video-area" style="display:none;">
<div class="video-wrap">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
</div>
<button class="btn btn-red" onclick="location.reload()">ЗАВЕРШИТЬ</button>
</div>

<div id="log"></div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
const logArea = document.getElementById('log');
function log(m) { logArea.innerHTML += `> ${m}
`; logArea.scrollTop = logArea.scrollHeight; }

// 1. ПРОВЕРКА HTTPS
const isHttps = location.protocol === 'https:';
const pCheck = document.getElementById('protocol-check');
pCheck.innerText = isHttps ? 'HTTPS OK' : 'БЕЗ HTTPS НЕ РАБОТАЕТ';
pCheck.style.background = isHttps ? 'green' : 'red';

let peer, localStream, currentCall;

// 2. ПОДКЛЮЧЕНИЕ К ОБЛАКУ (БЕЗ ТВОЕГО СЕРВЕРА)
peer = new Peer({
config: {
'iceServers': [
{ urls: 'stun:stun.l.google.com:19302' },
{ urls: 'stun:stun1.l.google.com:19302' }
]
}
});

peer.on('open', id => {
document.getElementById('my-id').innerText = id;
log('Подключен к ОБЛАКУ. Твой ID: ' + id);
});

peer.on('error', err => {
log('ОШИБКА: ' + err.type);
if(err.type === 'peer-unavailable') alert('Друг не найден. Проверь ID!');
});

// Входящий звонок
peer.on('call', call => {
log('Входящий звонок от: ' + call.peer);
currentCall = call;
document.getElementById('setup-area').style.display = 'none';
document.getElementById('incoming-area').style.display = 'block';
});

async function startCall() {
const tid = document.getElementById('target-id').value.trim();if(!tid) return alert('Введи ID!');

try {
log('Запрос доступа к камере...');
localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
log('Камера получена. Вызываю...');

const call = peer.call(tid, localStream);
setupConnection(call);
} catch (e) {
log('ОШИБКА КАМЕРЫ: ' + e.message);
alert('Нет доступа к камере. Нужен HTTPS!');
}
}

async function acceptCall() {
try {
log('Запрос камеры для ответа...');
localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
currentCall.answer(localStream);
document.getElementById('incoming-area').style.display = 'none';
setupConnection(currentCall);
} catch (e) {
log('ОШИБКА КАМЕРЫ: ' + e.message);
}
}

function setupConnection(call) {
document.getElementById('setup-area').style.display = 'none';
document.getElementById('video-area').style.display = 'block';
document.getElementById('local-video').srcObject = localStream;

call.on('stream', remoteStream => {
log('УРА! ПОТОК ПОЛУЧЕН!');
const rv = document.getElementById('remote-video');
rv.srcObject = remoteStream;
rv.play().catch(e => log('Ошибка воспроизведения: ' + e.message));
});

call.on('close', () => location.reload());
}
</script>
</body>
</html>
