<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЗВОНОК v6.6 | Stable</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --orange: #ffaa00; --bg: #0b0b0b; }
body { background: var(--bg); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

.card { background: #1a1a1a; padding: 25px; border-radius: 32px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

.status-dot { height: 10px; width: 10px; background: var(--red); border-radius: 50%; display: inline-block; margin-right: 5px; }
.status-online { background: var(--green); box-shadow: 0 0 10px var(--green); }

#my-id-display {
background: #000; padding: 12px; border-radius: 12px; font-family: monospace;
margin: 15px 0; border: 1px dashed #444; cursor: pointer; transition: 0.2s;
}
#my-id-display:active { transform: scale(0.95); background: #222; }

input {
width: 100%; padding: 15px; box-sizing: border-box; border-radius: 14px;
border: 1px solid #333; background: #000; color: #fff; font-size: 16px; outline: none; margin-bottom: 10px;
}

.btn {
width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: bold;
cursor: pointer; transition: 0.3s; font-size: 16px; margin-top: 5px;
}
.btn-call { background: var(--green); color: #000; }
.btn-hangup { background: var(--red); color: #fff; display: none; }

#video-container { position: relative; width: 100%; margin-top: 20px; display: none; border-radius: 20px; overflow: hidden; background: #000; aspect-ratio: 4/3; }
video { width: 100%; height: 100%; object-fit: cover; }
#local-video { position: absolute; top: 10px; right: 10px; width: 30%; border: 2px solid var(--green); border-radius: 12px; z-index: 10; }

.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
.icon-btn { background: #333; color: white; padding: 10px; border-radius: 10px; border: none; cursor: pointer; }
.icon-btn.active { background: var(--red); }
</style>
</head>
<body>

<div class="card" id="main-card">
<div style="display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
<span id="status-dot" class="status-dot"></span>
<h2 style="margin: 0;">ЗВОНОК <span style="color:var(--green)">v6.6</span></h2>
</div>

<p style="font-size: 14px; color: #888;">Ваш постоянный ID (нажми, чтобы скопировать):</p>
<div id="my-id-display">Загрузка...</div>

<div id="call-ui">
<input type="text" id="remote-id" placeholder="Введите ID собеседника">
<button class="btn btn-call" onclick="makeCall()">📞 ПОЗВОНИТЬ</button>
</div>

<button class="btn btn-hangup" id="hangup-btn" onclick="endCall()">🔴 ЗАВЕРШИТЬ</button>

<div id="video-container">
<video id="local-video" autoplay muted playsinline></video>
<video id="remote-video" autoplay playsinline></video>
<div style="position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px;">
<button class="icon-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
<button class="icon-btn" id="cam-btn" onclick="toggleCam()">📷</button>
</div>
</div>
</div>

<script>
let peer, localStream, currentCall;
const myIdDisplay = document.getElementById('my-id-display');
const statusDot = document.getElementById('status-dot');

// 1. ПЕРМАНЕНТНЫЙ IDfunction getPersistentId() {
let id = localStorage.getItem('v6_stable_id');
if (!id) {
id = 'user-' + Math.random().toString(36).substr(2, 9);
localStorage.setItem('v6_stable_id', id);
}
return id;
}

const myId = getPersistentId();
myIdDisplay.innerText = myId;

// Копирование по клику
myIdDisplay.onclick = () => {
navigator.clipboard.writeText(myId);
const originalText = myIdDisplay.innerText;
myIdDisplay.innerText = "СКОПИРОВАНО!";
setTimeout(() => myIdDisplay.innerText = originalText, 1000);
};

// Инициализация Peer
function initPeer() {
peer = new Peer(myId, {
host: window.location.hostname,
port: window.location.port || (window.location.protocol === 'https:' ? 443 : 80),
path: '/peerjs',
debug: 1
});

peer.on('open', () => {
statusDot.classList.add('status-online');
console.log('Подключено к серверу. ID:', myId);
});

peer.on('call', async (call) => {
if (confirm("Входящий вызов! Ответить?")) {
const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
setupStream(stream);
call.answer(stream);
handleCall(call);
} else {
call.close();
}
});

peer.on('error', (err) => {
console.error('Peer Error:', err.type);
if (err.type === 'peer-unavailable') alert('Собеседник не в сети');
});
}

async function makeCall() {
const remoteId = document.getElementById('remote-id').value;
if (!remoteId) return alert('Введите ID');

try {
const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
setupStream(stream);
const call = peer.call(remoteId, stream);
handleCall(call);
} catch (err) {
alert('Ошибка доступа к камере/микрофону');
}
}

function setupStream(stream) {
localStream = stream;
document.getElementById('local-video').srcObject = stream;
document.getElementById('video-container').style.display = 'block';
document.getElementById('call-ui').style.display = 'none';
document.getElementById('hangup-btn').style.display = 'block';
}

function handleCall(call) {
currentCall = call;
call.on('stream', (remoteStream) => {
document.getElementById('remote-video').srcObject = remoteStream;
});
call.on('close', endCall);
}

function endCall() {
if (currentCall) currentCall.close();
if (localStream) localStream.getTracks().forEach(t => t.stop());

document.getElementById('video-container').style.display = 'none';
document.getElementById('call-ui').style.display = 'block';
document.getElementById('hangup-btn').style.display = 'none';
location.reload(); // Для полной очистки памяти и готовности к новому звонку
}

// Управление медиа
function toggleMic() {
const track = localStream.getAudioTracks()[0];
track.enabled = !track.enabled;
document.getElementById('mic-btn').classList.toggle('active', !track.enabled);
}

function toggleCam() {
const track = localStream.getVideoTracks()[0];
track.enabled = !track.enabled;
document.getElementById('cam-btn').classList.toggle('active', !track.enabled);
}

initPeer();
</script>

</body>
</html>
