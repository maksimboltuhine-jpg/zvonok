<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINAL CALL STABLE</title>
<style>
body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
video { width: 100%; max-width: 400px; border-radius: 10px; background: #222; margin: 10px 0; }
#local-video { width: 100px; position: absolute; top: 30px; right: 30px; border: 2px solid #00ff88; }
input { padding: 15px; width: 80%; border-radius: 10px; border: none; margin: 10px 0; }
button { padding: 15px 30px; border-radius: 10px; border: none; background: #00ff88; font-weight: bold; cursor: pointer; }
.id-box { font-size: 20px; color: #00ff88; margin: 20px; font-family: monospace; border: 1px dashed; padding: 10px; }
</style>
</head>
<body>

<h2>VIDEO CALL</h2>

<div class="id-box" id="my-id">ПОДКЛЮЧЕНИЕ К СЕТИ...</div>

<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>

<div id="ui">
<input type="text" id="target-id" placeholder="ID ДРУГА">


<button onclick="startCall()">ПОЗВОНИТЬ</button>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
// Генерируем простой ID
const myId = 'user-' + Math.floor(Math.random() * 10000);

// ВНИМАНИЕ: Используем дефолтные серверы PeerJS Cloud для пробива городов
const peer = new Peer(myId);

let localStream;

peer.on('open', id => {
document.getElementById('my-id').innerText = "ТВОЙ ID: " + id;
});

// Обработка входящего звонка
peer.on('call', async (call) => {
localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
document.getElementById('local-video').srcObject = localStream;
call.answer(localStream);

call.on('stream', remoteStream => {
document.getElementById('remote-video').srcObject = remoteStream;
});
});

// Функция исходящего звонка
async function startCall() {
const targetId = document.getElementById('target-id').value;
if(!targetId) return alert("Введи ID!");

localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
document.getElementById('local-video').srcObject = localStream;

const call = peer.call(targetId, localStream);

call.on('stream', remoteStream => {
document.getElementById('remote-video').srcObject = remoteStream;
});

call.on('error', err => alert("Ошибка: " + err));
}
</script>
</body>
</html>
