<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЗВОНОК v7.2 | Debug Mode</title>
<style>
body { background: #111; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
.box { background: #222; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
video { width: 100%; border-radius: 10px; background: #000; margin-top: 10px; }
#local-video { width: 120px; border: 2px solid #00ff88; }
.btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
.btn-green { background: #00ff88; color: #000; }
.btn-red { background: #ff3b3b; color: #fff; }
#log { background: #000; color: #00ff00; font-size: 10px; text-align: left; padding: 10px; height: 100px; overflow-y: auto; margin-top: 10px; border-radius: 5px; font-family: monospace; }
input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 10px; box-sizing: border-box; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="box">
<h3>Call v7.2 <span id="status" style="color:red">●</span></h3>
<div id="my-id" style="font-weight:bold; color:#00ff88; margin-bottom:10px;">Загрузка ID...</div>

<div id="setup">
<input type="text" id="peer-id" placeholder="ID собеседника">
<button class="btn btn-green" onclick="startCall()">ПОЗВОНИТЬ</button>
</div>

<div id="incoming" class="hidden" style="border: 2px solid #00ff88; padding: 10px; margin: 10px 0;">
<p>Входящий звонок!</p>
<button class="btn btn-green" onclick="acceptCall()">ОТВЕТИТЬ</button>
</div>

<div id="video-area" class="hidden">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
<button class="btn btn-red" onclick="location.reload()">ЗАВЕРШИТЬ</button>
</div>

<div id="log">Система готова...</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
const logDiv = document.getElementById('log');
function log(msg) {
logDiv.innerHTML += `> ${msg}
`;
logDiv.scrollTop = logDiv.scrollHeight;
console.log(msg);
}

let peer, localStream, currentCall;
const savedId = localStorage.getItem('v72_id') || Math.random().toString(36).substr(2, 6);
localStorage.setItem('v72_id', savedId);

// Инициализация
peer = new Peer(savedId, {
host: location.hostname,
port: location.protocol === 'https:' ? 443 : (location.port || 80),
path: '/peerjs',
secure: location.protocol === 'https:',
config: {
'iceServers': [
{ urls: 'stun:stun.l.google.com:19302' },
{ urls: 'stun:stun1.l.google.com:19302' },
{ urls: 'stun:stun2.l.google.com:19302' }
],
'iceCandidatePoolSize': 10
}
});

peer.on('open', id => {
document.getElementById('my-id').innerText = id;
document.getElementById('status').style.color = '#00ff88';
log('Подключен к серверу под ID: ' + id);
});

peer.on('error', err => {
log('ОШИБКА PEER: ' + err.type);
if(err.type === 'browser-incompatible') alert('Браузер не поддерживает WebRTC');
});

// Входящий звонок
peer.on('call', call => {
log('Входящий звонок от: ' + call.peer);
currentCall = call;
document.getElementById('incoming').classList.remove('hidden');
});

async function startCall() {
const tid = document.getElementById('peer-id').value;
if(!tid) return alert('Введи ID');

log('Запрашиваю камеру...');
try {
localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
log('Камера получена. Звоню...');

const call = peer.call(tid, localStream);
handleCall(call);
} catch (e) {
log('ОШИБКА КАМЕРЫ: ' + e.message);
alert('Нет доступа к камере. Проверь HTTPS!');
}
}

async function acceptCall() {
log('Принимаю звонок, запрашиваю камеру...');
try {
localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
currentCall.answer(localStream);
document.getElementById('incoming').classList.add('hidden');
handleCall(currentCall);
} catch (e) {
log('ОШИБКА КАМЕРЫ: ' + e.message);
}
}

function handleCall(call) {
document.getElementById('setup').classList.add('hidden');
document.getElementById('video-area').classList.remove('hidden');
document.getElementById('local-video').srcObject = localStream;

call.on('stream', remoteStream => {
log('ПОЛУЧЕН ВИДЕОПОТОК!');
const rv = document.getElementById('remote-video');
rv.srcObject = remoteStream;
// Принудительный запуск для обхода политик
rv.play().catch(e => log('Ошибка автоплея: ' + e.message));
});

call.on('close', () => location.reload());
}
</script>
</body>
</html>
