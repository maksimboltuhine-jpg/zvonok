<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЗВОНОК v7.0 | Final Stable</title>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --orange: #ffaa00; --bg: #0b0b0b; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

/* Основная карточка */
.card { background: #1a1a1a; padding: 25px; border-radius: 32px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; z-index: 10; }

/* Видео */
#video-container { position: relative; width: 100%; margin: 15px 0; display: none; border-radius: 20px; overflow: hidden; background: #000; border: 1px solid #444; aspect-ratio: 4/3; }
video { width: 100%; height: 100%; object-fit: cover; }
#local-video { position: absolute; top: 10px; right: 10px; width: 80px; height: 110px; border: 2px solid var(--green); border-radius: 12px; z-index: 20; transform: scaleX(-1); background: #111; }

/* Трансляция экрана (Демка) */
#screen-wrap { position: fixed; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; }
#remote-screen { width: 100%; height: 100%; object-fit: contain; }

.info { background: #000; padding: 15px; border-radius: 16px; margin-bottom: 20px; color: var(--green); font-weight: bold; cursor: pointer; border: 1px dashed #444; font-family: monospace; font-size: 1.1em; }

.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
input { grid-column: span 2; padding: 16px; border-radius: 16px; border: 1px solid #333; background: #080808; color: #fff; text-align: center; font-size: 16px; outline: none; }
input:focus { border-color: var(--green); }

.btn { padding: 16px; border-radius: 16px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
.btn:active { transform: scale(0.95); }
.btn-call { background: var(--green); color: #000; grid-column: span 2; }
.btn-opt { background: #252525; color: #fff; }
.btn-opt.active { background: var(--green); color: #000; }
.btn-screen { background: var(--orange); color: #000; grid-column: span 2; display: none; }
.btn-red { background: var(--red); color: #fff; }

/* Оверлей звонка */
#inc-call { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

.screen-nav { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; z-index: 110; }
</style>
</head>
<body>

<div class="card" id="main-ui">
<h3 style="margin: 0 0 15px 0; color:var(--green); letter-spacing: 1px;">ЗВОНОК v7.0</h3>

<div id="video-container">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
</div>

<div class="info" id="my-id-box" onclick="copyId()">ИНИЦИАЛИЗАЦИЯ...</div>

<div id="start-form" class="controls">
<input type="text" id="target-id" placeholder="ID СОБЕСЕДНИКА">
<button class="btn btn-call" onclick="startCall()">📞 ПОЗВОНИТЬ</button>
</div>

<div id="active-menu" class="controls" style="display:none">
<button class="btn btn-opt active" id="m-tgl" onclick="tglMic()">🎤 ВКЛ</button>
<button class="btn btn-opt active" id="v-tgl" onclick="tglVid()">📷 ВКЛ</button>
<button class="btn btn-screen" id="scr-btn" onclick="shareScr()">🖥 ТРАНСЛЯЦИЯ</button>
<button class="btn btn-red" style="grid-column: span 2; margin-top:10px" onclick="location.reload()">ЗАВЕРШИТЬ</button>
</div>
</div>

<div id="screen-wrap">
<video id="remote-screen" autoplay playsinline></video>
<div class="screen-nav">
<button class="btn btn-opt" onclick="toggleFull()">ВЕСЬ ЭКРАН</button>
<button class="btn btn-red" onclick="closeScr()">ЗАКРЫТЬ</button>
</div>
</div>

<div id="inc-call">
<div style="background:var(--green); width:70px; height:70px; border-radius:50%; margin-bottom:20px; display:flex; align-items:center; justify-content:center; font-size:30px">📞</div>
<h2 style="margin-bottom:30px">ВХОДЯЩИЙ ВЫЗОВ</h2>
<button class="btn btn-call" id="ans-btn" style="width:250px; margin-bottom:15px">ОТВЕТИТЬ</button>
<button class="btn btn-red" style="width:250px" onclick="location.reload()">ОТКЛОНИТЬ</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer, localStream, screenStream, currentCall, screenCall;

// Постоянный ID
const myId = localStorage.getItem('v7_id') || 'u' + Math.random().toString(36).substr(2, 6);
localStorage.setItem('v7_id', myId);
document.getElementById('my-id-box').innerText = myId;

function init() {
peer = new Peer(myId, {
host: location.hostname,
port: location.protocol === 'https:' ? 443 : (location.port || 80),
path: '/peerjs',
secure: location.protocol === 'https:',
config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
});

peer.on('call', call => {
if (call.metadata && call.metadata.type === 'screen') {
call.answer();
call.on('stream', stream => {
document.getElementById('screen-wrap').style.display = 'flex';
const sv = document.getElementById('remote-screen');
sv.srcObject = stream;
sv.play().catch(e => console.log("Autoplay blocked"));
});
} else {
document.getElementById('inc-call').style.display = 'flex';
document.getElementById('ans-btn').onclick = async () => {
try {
localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
call.answer(localStream);
document.getElementById('inc-call').style.display = 'none';
setupUI(call);
} catch (e) {
alert("Разрешите доступ к камере!");
location.reload();
}
};
}
});

peer.on('error', err => {
if(err.type === 'peer-unavailable') alert("Собеседник не в сети");
console.error(err);
});
}

async function startCall() {
const tid = document.getElementById('target-id').value.trim();
if(!tid) return alert("Введите ID");
try {
localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
const call = peer.call(tid, localStream);
setupUI(call);
} catch (e) {
alert("Камера недоступна");
}
}

function setupUI(call) {
currentCall = call;
document.getElementById('start-form').style.display = 'none';
document.getElementById('active-menu').style.display = 'grid';
document.getElementById('video-container').style.display = 'block';
document.getElementById('local-video').srcObject = localStream;

if(!/Mobi|Android/i.test(navigator.userAgent)) {
document.getElementById('scr-btn').style.display = 'block';
}

call.on('stream', stream => {
const rv = document.getElementById('remote-video');rv.srcObject = stream;
rv.play().catch(e => {});
});

call.on('close', () => location.reload());
}

async function shareScr() {
if (screenStream) {
screenStream.getTracks().forEach(t => t.stop());
screenStream = null;
document.getElementById('scr-btn').innerText = "🖥 ТРАНСЛЯЦИЯ";
return;
}
try {
screenStream = await navigator.mediaDevices.getDisplayMedia({video: true});
screenCall = peer.call(currentCall.peer, screenStream, {metadata: {type: 'screen'}});
document.getElementById('scr-btn').innerText = "🛑 ОСТАНОВИТЬ";
screenStream.getVideoTracks()[0].onended = () => {
document.getElementById('scr-btn').innerText = "🖥 ТРАНСЛЯЦИЯ";
screenStream = null;
};
} catch (e) { console.error(e); }
}

function toggleFull() {
const v = document.getElementById('remote-screen');
if (v.requestFullscreen) v.requestFullscreen();
else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
}

function closeScr() {
document.getElementById('screen-wrap').style.display = 'none';
}

function tglMic() {
const t = localStream.getAudioTracks()[0];
t.enabled = !t.enabled;
document.getElementById('m-tgl').innerText = t.enabled ? "🎤 ВКЛ" : "🎤 ВЫКЛ";
document.getElementById('m-tgl').classList.toggle('active', t.enabled);
}

function tglVid() {
const t = localStream.getVideoTracks()[0];
t.enabled = !t.enabled;
document.getElementById('v-tgl').innerText = t.enabled ? "📷 ВКЛ" : "📷 ВЫКЛ";
document.getElementById('v-tgl').classList.toggle('active', t.enabled);
}

function copyId() {
navigator.clipboard.writeText(myId);
const b = document.getElementById('my-id-box');
b.innerText = "СКОПИРОВАНО!";
setTimeout(() => b.innerText = myId, 1000);
}

init();
</script>
</body>
</html>
