<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЗВОНОК v6.5.5 | Crystal Clear</title>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --orange: #ffaa00; --bg: #0b0b0b; }
body { background: var(--bg); color: #fff; font-family: system-ui, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
.card { background: #1a1a1a; padding: 20px; border-radius: 28px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #333; position: relative; }
#video-container { position: relative; width: 100%; margin: 15px 0; display: none; border-radius: 16px; overflow: hidden; background: #000; border: 1px solid #444; aspect-ratio: 4/3; }
video { width: 100%; height: 100%; object-fit: cover; background: #000; }
#local-video { position: absolute; top: 10px; right: 10px; width: 80px; height: 110px; border: 2px solid var(--green); border-radius: 10px; transform: scaleX(-1); z-index: 5; background: #222; }
#remote-screen-container { width: 100%; margin-top: 10px; border-radius: 12px; overflow: hidden; display: none; border: 2px solid var(--orange); }
.info { background: #222; padding: 12px; border-radius: 15px; margin-bottom: 15px; color: var(--green); font-weight: bold; cursor: pointer; border: 1px dashed #444; font-size: 14px; }
.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
input { grid-column: span 2; padding: 15px; border-radius: 14px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 16px; outline: none; }
.btn { padding: 15px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; }
.btn-main { background: var(--green); color: #000; grid-column: span 2; }
.btn-opt { background: #333; color: #fff; }
.btn-opt.active { background: var(--green); color: #000; }
.btn-screen { background: var(--orange); color: #000; grid-column: span 2; display: none; margin-top: 5px; }
.btn-red { background: var(--red); color: #fff; grid-column: span 2; margin-top: 10px; display: none; }
#inc-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="card">
<h3 style="margin:0 0 10px 0; color:var(--green)">ЗВОНОК v6.5.5</h3>
<div id="video-container">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
</div>
<div id="remote-screen-container">
<video id="remote-screen" autoplay playsinline></video>
</div>
<div class="info" id="my-id-display" onclick="copyId()">ПОДКЛЮЧЕНИЕ...</div>
<div id="setup-ui" class="controls">
<input type="text" id="peer-id-input" placeholder="ID СОБЕСЕДНИКА">
<button class="btn btn-main" onclick="makeCall()">📞 ПОЗВОНИТЬ</button>
</div>
<div id="active-ui" class="controls" style="display:none">
<button class="btn btn-opt active" id="mic-toggle" onclick="toggleMic()">🎤 МИК</button>
<button class="btn btn-opt active" id="cam-toggle" onclick="toggleCam()">📷 КАМ</button>
<button class="btn btn-screen" id="screen-btn" onclick="shareScreen()">🖥 ТРАНСЛЯЦИЯ</button>
<button class="btn btn-red" id="hangup" style="display:block" onclick="location.reload()">ЗАВЕРШИТЬ</button>
</div>
</div>

<div id="inc-overlay">
<h2 style="color:var(--green)">ВХОДЯЩИЙ ВЫЗОВ</h2>
<button class="btn btn-main" id="accept-btn" style="width:200px; margin-bottom:10px">ОТВЕТИТЬ</button>
<button class="btn btn-red" style="display:block; width:200px" onclick="location.reload()">ОТКЛОНИТЬ</button>
</div>

<scriptsrc="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer, localStream, screenStream, currentCall, screenCall;
const myId = localStorage.getItem('v6_id') || 'u' + Math.floor(Math.random()*90000+10000);
localStorage.setItem('v6_id', myId);

// Конфиг звука для кристальной чистоты
const audioConfig = {
echoCancellation: true,
noiseSuppression: true,
autoGainControl: true,
sampleRate: 48000
};

async function getMedia(videoNeeded = true) {
try {
return await navigator.mediaDevices.getUserMedia({ audio: audioConfig, video: videoNeeded });
} catch (e) {
if (videoNeeded) return await navigator.mediaDevices.getUserMedia({ audio: audioConfig, video: false });
throw e;
}
}

function initPeer() {
peer = new Peer(myId, {
host: location.hostname,
port: location.protocol === 'https:' ? 443 : (location.port || 80),
path: '/peerjs',
secure: location.protocol === 'https:',
config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
});

peer.on('open', id => document.getElementById('my-id-display').innerText = "ID: " + id);

peer.on('call', call => {
if (call.metadata?.type === 'screen') {
call.answer();
call.on('stream', s => {
document.getElementById('remote-screen-container').style.display = 'block';
document.getElementById('remote-screen').srcObject = s;
});
return;
}
document.getElementById('inc-overlay').style.display = 'flex';
document.getElementById('accept-btn').onclick = async () => {
localStream = await getMedia();
call.answer(localStream);
document.getElementById('inc-overlay').style.display = 'none';
handleCall(call);
};
});
}

async function makeCall() {
const remoteId = document.getElementById('peer-id-input').value;
if(!remoteId) return alert("Введите ID");
try {
localStream = await getMedia();
const call = peer.call(remoteId, localStream);
handleCall(call);
} catch(e) { alert("Ошибка доступа"); }
}

function handleCall(call) {
currentCall = call;
document.getElementById('setup-ui').style.display = 'none';
document.getElementById('active-ui').style.display = 'grid';
document.getElementById('video-container').style.display = 'block';
if (localStream.getVideoTracks().length > 0) document.getElementById('local-video').srcObject = localStream;
if(!/Android|iPhone/i.test(navigator.userAgent)) document.getElementById('screen-btn').style.display = 'block';
call.on('stream', s => document.getElementById('remote-video').srcObject = s);
}

async function shareScreen() {
if(screenStream) { location.reload(); return; }
try {
// Запрос экрана с системным звуком
screenStream = await navigator.mediaDevices.getDisplayMedia({
video: { cursor: "always" },
audio: { echoCancellation: true, noiseSuppression: true }
});
screenCall = peer.call(currentCall.peer, screenStream, {metadata: {type: 'screen'}});
document.getElementById('screen-btn').innerText = "СТОП ЭКРАН";
} catch(e) { console.error(e); }
}

function toggleMic() {
const t = localStream.getAudioTracks()[0];
t.enabled = !t.enabled;
document.getElementById('mic-toggle').classList.toggle('active', t.enabled);
}

function toggleCam() {
const tracks = localStream.getVideoTracks();
if (tracks.length > 0) {
tracks[0].enabled = !tracks[0].enabled;
document.getElementById('cam-toggle').classList.toggle('active', tracks[0].enabled);
}
}

function copyId() {
navigator.clipboard.writeText(myId);
alert("ID скопирован");
}

initPeer();
</script>
</body>
</html>
