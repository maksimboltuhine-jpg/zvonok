<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CALL v23 ULTIMATE</title>
<style>
:root { --green: #00ff88; --red: #ff3b3b; --bg: #0a0a0a; }
body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: #161616; padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; }

#video-container { position: relative; width: 100%; margin: 15px 0; display: none; border-radius: 16px; overflow: hidden; background: #000; aspect-ratio: 16/9; border: 1px solid #444; }
video { width: 100%; height: 100%; object-fit: contain; }
#local-video { position: absolute; top: 10px; right: 10px; width: 80px; height: 110px; border: 2px solid var(--green); border-radius: 10px; transform: scaleX(-1); object-fit: cover; z-index: 10; }

.controls { display: none; justify-content: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.btn { padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; background: #333; color: #fff; transition: 0.2s; }
.btn-circle { width: 50px; height: 50px; border-radius: 50%; font-size: 20px; }
.off { background: var(--red) !important; }
.active { background: var(--green) !important; color: #000; }

.my-id { background: #1a1a1a; padding: 12px; border-radius: 12px; margin: 10px 0; color: var(--green); border: 1px dashed #444; cursor: pointer; }
input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 10px; text-align: center; box-sizing: border-box; }
.btn-main { width: 100%; background: var(--green); color: #000; padding: 15px; font-size: 16px; }

#incoming { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
#log { font-size: 10px; color: #666; margin-top: 10px; font-family: monospace; }
</style>
</head>
<body>

<div class="card">
<h3 style="margin:0; color:var(--green)">v23.0 ULTIMATE</h3>

<div id="video-container">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
</div>

<div class="controls" id="controls">
<button class="btn btn-circle" id="mic-btn" onclick="toggleMic()">🎤</button>
<button class="btn btn-circle" id="cam-btn" onclick="toggleCam()">📷</button>
<button class="btn btn-circle" id="screen-btn" onclick="toggleScreen()">🖥</button>
<button class="btn" onclick="location.reload()" style="background:var(--red)">СБРОС</button>
</div>

<div class="my-id" id="my-id" onclick="copyId()">ПОДКЛЮЧЕНИЕ...</div>

<div id="ui">
<input type="text" id="target-id" placeholder="ID ДРУГА">
<button class="btn btn-main" onclick="startCall()">📞 ПОЗВОНИТЬ</button>
</div>

<div id="log">Система готова</div>
</div>

<div id="incoming">
<h2 style="color:var(--green)">ВХОДЯЩИЙ ВЫЗОВ</h2>
<button class="btn btn-main" id="answer-btn" style="width:200px">ОТВЕТИТЬ</button>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
const log = (m) => document.getElementById('log').innerText = m;
let myId = localStorage.getItem('v23_id') || ('u' + Math.floor(Math.random()*9000+1000));
localStorage.setItem('v23_id', myId);

let peer, localStream, currentCall, screenStream;

function init() {
peer = new Peer(myId, {
host: location.hostname,
port: location.port || (location.protocol === 'https:' ? 443 : 80),
path: '/peerjs',secure: location.protocol === 'https:'
});

peer.on('open', id => {
document.getElementById('my-id').innerText = "ID: " + id;
log("Сервер онлайн");
});

peer.on('call', call => {
document.getElementById('incoming').style.display = 'flex';
document.getElementById('answer-btn').onclick = async () => {
try {
localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
call.answer(localStream);
document.getElementById('incoming').style.display = 'none';
setupCall(call);
} catch (e) { alert("Дай доступ к камере!"); }
};
});
}

async function startCall() {
const id = document.getElementById('target-id').value;
if (!id) return;
try {
localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
setupCall(peer.call(id, localStream));
} catch (e) { alert("Камера недоступна"); }
}

function setupCall(call) {
currentCall = call;
document.getElementById('video-container').style.display = 'block';
document.getElementById('ui').style.display = 'none';
document.getElementById('controls').style.display = 'flex';
document.getElementById('local-video').srcObject = localStream;

call.on('stream', stream => {
const rv = document.getElementById('remote-video');
rv.srcObject = stream;
rv.play().catch(() => { document.onclick = () => rv.play(); });
});
}

async function toggleScreen() {
if (!currentCall) return;
const btn = document.getElementById('screen-btn');
const videoSender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
const audioSender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'audio');

if (!screenStream) {
try {
// ЗАПРОС ЭКРАНА + ЗВУКА СИСТЕМЫ
screenStream = await navigator.mediaDevices.getDisplayMedia({
video: true,
audio: true
});

const screenVideoTrack = screenStream.getVideoTracks()[0];
const screenAudioTrack = screenStream.getAudioTracks()[0];

// Подменяем видео
videoSender.replaceTrack(screenVideoTrack);

// Если в демке есть звук (галочка при выборе), подменяем и аудио
if (screenAudioTrack && audioSender) {
audioSender.replaceTrack(screenAudioTrack);
log("Демка: Видео + Звук");
} else {
log("Демка: Только видео");
}

document.getElementById('local-video').srcObject = screenStream;
btn.classList.add('active');

screenVideoTrack.onended = () => toggleScreen();
} catch (e) { log("Ошибка демки"); }
} else {
// ВОЗВРАТ НА КАМЕРУ И МИКРОФОН
screenStream.getTracks().forEach(t => t.stop());
screenStream = null;

videoSender.replaceTrack(localStream.getVideoTracks()[0]);
if (audioSender) audioSender.replaceTrack(localStream.getAudioTracks()[0]);

document.getElementById('local-video').srcObject = localStream;
btn.classList.remove('active');
log("Вернулись на камеру");
}
}

function toggleMic() {
const t = localStream.getAudioTracks()[0];
t.enabled = !t.enabled;
document.getElementById('mic-btn').classList.toggle('off', !t.enabled);
}

function toggleCam() {
const t = localStream.getVideoTracks()[0];
t.enabled = !t.enabled;
document.getElementById('cam-btn').classList.toggle('off', !t.enabled);
}

function copyId() {
const id = document.getElementById('my-id').innerText.replace("ID: ", "");
navigator.clipboard.writeText(id).then(() => alert("ID скопирован!"));
}

init();
</script>
</body>
</html>
